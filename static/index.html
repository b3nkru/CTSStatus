<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTSStatus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --up: #3fb950;
      --degraded: #d29922;
      --down: #f85149;
      --unknown: #6e7681;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--up);
      box-shadow: 0 0 6px var(--up);
      flex-shrink: 0;
    }

    .header-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .last-updated {
      color: var(--muted);
      font-size: 12px;
    }

    .refresh-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { background: var(--border); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Summary bar ── */
    .summary {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .summary-title {
      font-size: 22px;
      font-weight: 600;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 13px;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Project card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: #58a6ff55; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.up       { background: var(--up);       box-shadow: 0 0 6px var(--up); }
    .status-dot.degraded { background: var(--degraded); box-shadow: 0 0 6px var(--degraded); }
    .status-dot.down     { background: var(--down);     box-shadow: 0 0 6px var(--down); }
    .status-dot.timeout  { background: var(--down);     box-shadow: 0 0 6px var(--down); }
    .status-dot.error    { background: var(--degraded); box-shadow: 0 0 6px var(--degraded); }
    .status-dot.unknown  { background: var(--unknown); }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      opacity: 0.8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-link:hover { opacity: 1; }

    .card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Row ── */
    .row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
    }

    .row-label {
      color: var(--muted);
      width: 80px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .row-value {
      flex: 1;
      word-break: break-all;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-up       { background: #1a3a23; color: var(--up); }
    .badge-degraded { background: #3a2e0a; color: var(--degraded); }
    .badge-down     { background: #3a1a1a; color: var(--down); }
    .badge-timeout  { background: #3a1a1a; color: var(--down); }
    .badge-error    { background: #3a2e0a; color: var(--degraded); }
    .badge-unknown  { background: var(--surface2); color: var(--unknown); }

    /* ── Container list ── */
    .containers {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .container-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .container-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .container-dot.running { background: var(--up); }
    .container-dot.exited  { background: var(--down); }
    .container-dot.other   { background: var(--unknown); }

    .container-name { color: var(--text); }

    /* ── Commit ── */
    .commit-hash {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      background: var(--surface2);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--accent);
      margin-right: 4px;
    }

    .commit-msg {
      color: var(--muted);
      font-size: 12px;
    }

    .commit-time {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Empty / Loading / Error states ── */
    .state-box {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 48px;
      text-align: center;
      color: var(--muted);
    }

    .state-box h2 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
    .state-box p  { font-size: 13px; }

    /* ── Logs panel ── */
    .logs-toggle {
      margin-top: 32px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .logs-toggle:hover { color: var(--text); }

    .logs-panel {
      display: none;
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .logs-panel.open { display: block; }

    .logs-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .logs-body {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 12px 16px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #8b949e;
    }

    .logs-body .log-line-error { color: var(--down); }
    .logs-body .log-line-warn  { color: var(--degraded); }
    .logs-body .log-line-ok    { color: var(--up); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px 24px;
      color: var(--muted);
      font-size: 12px;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-inner { padding: 0 16px; }
      main { padding: 20px 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-dot" id="global-dot"></span>
      CTSStatus
    </div>
    <div class="header-meta">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadProjects(true)">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </div>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div class="grid" id="grid"></div>

  <div class="logs-toggle" id="logs-toggle" onclick="toggleLogs()">
    ▶ Deploy logs
  </div>
  <div class="logs-panel" id="logs-panel">
    <div class="logs-header">
      <span>Recent deploy log entries</span>
      <span id="logs-count"></span>
    </div>
    <div class="logs-body" id="logs-body"></div>
  </div>
</main>

<footer>
  Powered by <a href="https://github.com/benkruseski/CTSDeploy" target="_blank">CTSDeploy</a>
  &nbsp;·&nbsp; benkruseski.com
</footer>

<script>
  let logsLoaded = false;
  let refreshTimer = null;
  const REFRESH_INTERVAL = 30; // seconds

  /* ── Utilities ── */

  function timeAgo(isoStr) {
    if (!isoStr) return null;
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  function statusLabel(s) {
    return { up: "Up", down: "Down", degraded: "Degraded", timeout: "Timeout", error: "Error", unknown: "Unknown" }[s] || s;
  }

  function containerDotClass(status) {
    if (status === "running") return "running";
    if (status === "exited") return "exited";
    return "other";
  }

  /* ── Render ── */

  function renderSummary(projects) {
    const total = projects.length;
    const up = projects.filter(p => p.status === "up").length;
    const down = projects.filter(p => p.status === "down" || p.status === "timeout").length;
    const degraded = projects.filter(p => p.status === "degraded" || p.status === "error").length;

    // Global dot color
    const dot = document.getElementById("global-dot");
    if (down > 0) dot.style.cssText = "background:var(--down);box-shadow:0 0 6px var(--down)";
    else if (degraded > 0) dot.style.cssText = "background:var(--degraded);box-shadow:0 0 6px var(--degraded)";
    else dot.style.cssText = "background:var(--up);box-shadow:0 0 6px var(--up)";

    document.getElementById("summary").innerHTML = `
      <span class="summary-title">${total} project${total !== 1 ? "s" : ""}</span>
      <span class="pill"><span class="pill-dot" style="background:var(--up)"></span>${up} up</span>
      ${down ? `<span class="pill"><span class="pill-dot" style="background:var(--down)"></span>${down} down</span>` : ""}
      ${degraded ? `<span class="pill"><span class="pill-dot" style="background:var(--degraded)"></span>${degraded} degraded</span>` : ""}
    `;
  }

  function renderCard(p) {
    const status = p.status || "unknown";
    const httpBadge = `<span class="badge badge-${status}">${statusLabel(p.http_status)}${p.http_code ? ` ${p.http_code}` : ""}</span>`;

    const containers = p.containers && p.containers.length
      ? `<div class="containers">${p.containers.map(c => `
          <div class="container-item">
            <span class="container-dot ${containerDotClass(c.status)}"></span>
            <span class="container-name">${c.name}</span>
            <span style="margin-left:auto">${c.status}</span>
          </div>`).join("")}</div>`
      : `<span style="color:var(--muted);font-size:12px">No containers found</span>`;

    let commitHtml = `<span style="color:var(--muted);font-size:12px">—</span>`;
    if (p.last_commit) {
      const ago = timeAgo(p.last_commit.timestamp);
      commitHtml = `
        <div>
          <span class="commit-hash">${p.last_commit.hash}</span>
          <span class="commit-msg">${escapeHtml(p.last_commit.message)}</span>
        </div>
        ${ago ? `<div class="commit-time">${ago}</div>` : ""}
      `;
    }

    return `
      <div class="card">
        <div class="card-header">
          <span class="status-dot ${status}"></span>
          <span class="card-title">${escapeHtml(p.project_name)}</span>
          <a class="card-link" href="${p.url}" target="_blank" rel="noopener">
            ↗ ${p.project_name}.benkruseski.com
          </a>
        </div>
        <div class="card-body">
          <div class="row">
            <span class="row-label">HTTP</span>
            <span class="row-value">${httpBadge}</span>
          </div>
          <div class="row">
            <span class="row-label">Containers</span>
            <span class="row-value">${containers}</span>
          </div>
          <div class="row">
            <span class="row-label">Last commit</span>
            <span class="row-value">${commitHtml}</span>
          </div>
          <div class="row">
            <span class="row-label">Branch</span>
            <span class="row-value" style="color:var(--muted)">${escapeHtml(p.branch)}</span>
          </div>
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ── Load projects ── */

  async function loadProjects(force = false) {
    const btn = document.getElementById("refresh-btn");
    const icon = document.getElementById("refresh-icon");
    btn.disabled = true;
    icon.innerHTML = '<span class="spinner"></span>';

    clearTimeout(refreshTimer);

    try {
      const url = force ? "/api/projects?refresh=true" : "/api/projects";
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const projects = data.projects;

      renderSummary(projects);

      const grid = document.getElementById("grid");
      if (projects.length === 0) {
        grid.innerHTML = `
          <div class="state-box">
            <h2>No projects found</h2>
            <p>No CTSDeploy projects were detected in ${PROJECTS_DIR_HINT}.</p>
          </div>`;
      } else {
        grid.innerHTML = projects.map(renderCard).join("");
      }

      const ts = data.cached_at ? new Date(data.cached_at * 1000) : new Date();
      document.getElementById("last-updated").textContent =
        `Updated ${ts.toLocaleTimeString()}`;

    } catch (err) {
      document.getElementById("grid").innerHTML = `
        <div class="state-box">
          <h2>Failed to load</h2>
          <p>${escapeHtml(err.message)}</p>
        </div>`;
    } finally {
      btn.disabled = false;
      icon.innerHTML = "↻";
      scheduleRefresh();
    }
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(() => loadProjects(false), REFRESH_INTERVAL * 1000);
  }

  /* ── Logs ── */

  async function toggleLogs() {
    const panel = document.getElementById("logs-panel");
    const toggle = document.getElementById("logs-toggle");
    const isOpen = panel.classList.contains("open");

    if (isOpen) {
      panel.classList.remove("open");
      toggle.textContent = "▶ Deploy logs";
      return;
    }

    panel.classList.add("open");
    toggle.textContent = "▼ Deploy logs";

    if (logsLoaded) return;
    logsLoaded = true;

    const body = document.getElementById("logs-body");
    body.textContent = "Loading…";

    try {
      const res = await fetch("/api/logs?lines=100");
      const data = await res.json();
      const lines = data.logs;

      document.getElementById("logs-count").textContent = `${lines.length} lines`;

      if (lines.length === 0) {
        body.textContent = "No log entries found.";
        return;
      }

      body.innerHTML = lines.map(line => {
        const cls = /error|fail|exception/i.test(line) ? "log-line-error"
                  : /warn/i.test(line) ? "log-line-warn"
                  : /success|deployed|done/i.test(line) ? "log-line-ok"
                  : "";
        return `<span class="${cls}">${escapeHtml(line)}</span>`;
      }).join("\n");

      body.scrollTop = body.scrollHeight;
    } catch (err) {
      body.textContent = `Error: ${err.message}`;
    }
  }

  const PROJECTS_DIR_HINT = "/opt/ctsdeploy/projects";

  /* ── Init ── */
  loadProjects();
</script>
</body>
</html>
