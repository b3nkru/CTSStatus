<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTSStatus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c0f;
      --surface:  #0f1318;
      --surface2: #141920;
      --border:   #1e2733;
      --border2:  #253040;
      --text:     #cdd9e5;
      --muted:    #4a5568;
      --dim:      #2d3748;
      --up:       #3fb950;
      --up-dim:   #1a3a23;
      --down:     #f85149;
      --down-dim: #3a1a1a;
      --warn:     #d29922;
      --warn-dim: #3a2e0a;
      --unknown:  #4a5568;
      --accent:   #58a6ff;
      --prompt:   #388bfd;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .prompt-prefix {
      color: var(--up);
      user-select: none;
    }

    .prompt-host {
      color: var(--accent);
    }

    .prompt-sep {
      color: var(--muted);
      user-select: none;
    }

    .prompt-cmd {
      color: var(--text);
      font-weight: 500;
    }

    .prompt-arg {
      color: var(--warn);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--text);
      opacity: 0.8;
      animation: blink 1.2s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .refresh-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Output line (summary) ── */
    .output-line {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .output-line .arrow { color: var(--border2); }

    .stat { color: var(--text); }
    .stat-up   { color: var(--up); }
    .stat-down { color: var(--down); }
    .stat-warn { color: var(--warn); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--border2); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .status-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .status-tag.up      { background: var(--up-dim);   color: var(--up);   }
    .status-tag.down    { background: var(--down-dim);  color: var(--down); }
    .status-tag.degraded,
    .status-tag.timeout,
    .status-tag.error   { background: var(--warn-dim);  color: var(--warn); }
    .status-tag.unknown { background: var(--dim);        color: var(--muted); }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .card-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .card-link:hover { color: var(--accent); }

    /* ── Card body ── */
    .card-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .field:last-child { border-bottom: none; }

    .field-key {
      color: var(--muted);
      width: 72px;
      flex-shrink: 0;
      user-select: none;
    }

    .field-eq {
      color: var(--dim);
      margin-right: 8px;
      user-select: none;
    }

    .field-val {
      flex: 1;
      color: var(--text);
      word-break: break-all;
    }

    /* ── HTTP code ── */
    .http-code {
      display: inline-block;
      font-weight: 600;
      margin-right: 6px;
    }

    .http-code.ok   { color: var(--up); }
    .http-code.err  { color: var(--down); }
    .http-code.warn { color: var(--warn); }

    .http-label { color: var(--muted); font-size: 11px; }

    /* ── Containers ── */
    .containers { display: flex; flex-direction: column; gap: 3px; }

    .container-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .dot {
      font-size: 10px;
      line-height: 1;
      flex-shrink: 0;
    }

    .dot.running { color: var(--up); }
    .dot.exited  { color: var(--down); }
    .dot.other   { color: var(--muted); }

    .container-name { color: var(--text); }
    .container-status { color: var(--muted); margin-left: auto; }

    /* ── Commit ── */
    .commit-hash {
      color: var(--accent);
      margin-right: 6px;
    }

    .commit-msg { color: var(--muted); }

    .commit-time {
      display: block;
      color: var(--dim);
      font-size: 11px;
      margin-top: 1px;
    }

    /* ── Empty / Error ── */
    .state-box {
      grid-column: 1 / -1;
      padding: 40px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 6px;
    }

    .state-box .state-title {
      color: var(--down);
      margin-bottom: 6px;
    }

    /* ── Logs ── */
    .logs-section { margin-top: 28px; }

    .logs-toggle {
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.15s;
    }

    .logs-toggle:hover { color: var(--text); }

    .logs-toggle .toggle-arrow {
      color: var(--border2);
      transition: transform 0.15s;
    }

    .logs-toggle.open .toggle-arrow { transform: rotate(90deg); }

    .logs-panel {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .logs-panel.open { display: block; }

    .logs-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .logs-body {
      font-size: 11px;
      line-height: 1.7;
      padding: 12px 14px;
      max-height: 380px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--muted);
      background: var(--bg);
    }

    .log-err  { color: var(--down); }
    .log-warn { color: var(--warn); }
    .log-ok   { color: var(--up); }

    /* ── Footer ── */
    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px 28px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--border2); text-decoration: none; }
    footer a:hover { color: var(--muted); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header, main, footer { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
      .header-right { margin-left: 0; width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="prompt-prefix">ctsdeploy</span>
    <span class="prompt-sep">@</span>
    <span class="prompt-host">gallifreypi</span>
    <span class="prompt-sep">:~$</span>
    <span class="prompt-cmd">scan</span>
    <span class="prompt-arg">--domain benkruseski.com</span>
    <span class="cursor"></span>
    <div class="header-right">
      <span id="last-updated" style="color:var(--muted);font-size:11px"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadProjects(true)">
        <span id="refresh-icon">⟳</span> refresh
      </button>
    </div>
  </div>
</header>

<main>
  <div class="output-line" id="summary"></div>
  <div class="grid" id="grid"></div>

  <div class="logs-section">
    <div class="logs-toggle" id="logs-toggle" onclick="toggleLogs()">
      <span class="toggle-arrow">▶</span>
      <span class="prompt-sep">$</span> tail -f /var/log/ctsdeploy/deploy.log
    </div>
    <div class="logs-panel" id="logs-panel">
      <div class="logs-header">
        <span>deploy.log</span>
        <span id="logs-count"></span>
      </div>
      <div class="logs-body" id="logs-body"></div>
    </div>
  </div>
</main>

<footer>
  // powered by <a href="https://github.com/b3nkru/CTSDeploy" target="_blank">CTSDeploy</a>
  &nbsp;·&nbsp; benkruseski.com
</footer>

<script>
  let logsLoaded = false;
  let refreshTimer = null;
  const REFRESH_INTERVAL = 30;

  function esc(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function timeAgo(isoStr) {
    if (!isoStr) return null;
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 60)    return `${diff}s ago`;
    if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  function httpCodeClass(code) {
    if (!code) return "err";
    if (code < 400) return "ok";
    if (code < 500) return "warn";
    return "err";
  }

  function statusLabel(s) {
    const map = { up:"UP", down:"DOWN", degraded:"DEGRADED", timeout:"TIMEOUT", error:"ERROR", unknown:"???" };
    return map[s] || s.toUpperCase();
  }

  function renderSummary(projects) {
    const total    = projects.length;
    const up       = projects.filter(p => p.status === "up").length;
    const down     = projects.filter(p => ["down","timeout"].includes(p.status)).length;
    const degraded = projects.filter(p => ["degraded","error"].includes(p.status)).length;

    const parts = [
      `<span class="arrow">//</span> found <span class="stat">${total}</span> project${total !== 1 ? "s"  : ""}`,
      `<span class="stat-up">${up} online</span>`,
    ];
    if (down)     parts.push(`<span class="stat-down">${down} offline</span>`);
    if (degraded) parts.push(`<span class="stat-warn">${degraded} degraded</span>`);

    document.getElementById("summary").innerHTML = parts.join(`<span class="arrow"> · </span>`);
  }

  function renderContainers(containers) {
    if (!containers || containers.length === 0) {
      return `<span style="color:var(--muted)">none</span>`;
    }
    return `<div class="containers">${containers.map(c => {
      const cls = c.status === "running" ? "running" : c.status === "exited" ? "exited" : "other";
      const sym = c.status === "running" ? "●" : "○";
      return `<div class="container-row">
        <span class="dot ${cls}">${sym}</span>
        <span class="container-name">${esc(c.name)}</span>
        <span class="container-status">${esc(c.status)}</span>
      </div>`;
    }).join("")}</div>`;
  }

  function renderCard(p) {
    const status = p.status || "unknown";

    const httpVal = p.http_code
      ? `<span class="http-code ${httpCodeClass(p.http_code)}">${p.http_code}</span><span class="http-label">${esc(p.http_status)}</span>`
      : `<span class="http-code err">${esc(p.http_status)}</span>`;

    let commitVal = `<span style="color:var(--muted)">—</span>`;
    if (p.last_commit) {
      const ago = timeAgo(p.last_commit.timestamp);
      commitVal = `<span class="commit-hash">${esc(p.last_commit.hash)}</span><span class="commit-msg">${esc(p.last_commit.message)}</span>`
        + (ago ? `<span class="commit-time">${ago}</span>` : "");
    }

    return `
      <div class="card">
        <div class="card-header">
          <span class="status-tag ${status}">${statusLabel(status)}</span>
          <span class="card-name">${esc(p.project_name)}</span>
          <a class="card-link" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.project_name)}.benkruseski.com ↗</a>
        </div>
        <div class="card-body">
          <div class="field">
            <span class="field-key">http</span>
            <span class="field-eq">=</span>
            <span class="field-val">${httpVal}</span>
          </div>
          <div class="field">
            <span class="field-key">containers</span>
            <span class="field-eq">=</span>
            <span class="field-val">${renderContainers(p.containers)}</span>
          </div>
          <div class="field">
            <span class="field-key">commit</span>
            <span class="field-eq">=</span>
            <span class="field-val">${commitVal}</span>
          </div>
          <div class="field">
            <span class="field-key">branch</span>
            <span class="field-eq">=</span>
            <span class="field-val" style="color:var(--accent)">${esc(p.branch)}</span>
          </div>
          <div class="field">
            <span class="field-key">port</span>
            <span class="field-eq">=</span>
            <span class="field-val" style="color:var(--muted)">${esc(p.port)}</span>
          </div>
        </div>
      </div>`;
  }

  async function loadProjects(force = false) {
    const btn  = document.getElementById("refresh-btn");
    const icon = document.getElementById("refresh-icon");
    btn.disabled = true;
    icon.innerHTML = '<span class="spinner"></span>';
    clearTimeout(refreshTimer);

    try {
      const res = await fetch(force ? "/api/projects?refresh=true" : "/api/projects");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const projects = data.projects;

      renderSummary(projects);

      const grid = document.getElementById("grid");
      if (projects.length === 0) {
        grid.innerHTML = `<div class="state-box"><div class="state-title">// no projects found</div><div>nothing detected in /opt/ctsdeploy/projects</div></div>`;
      } else {
        grid.innerHTML = projects.map(renderCard).join("");
      }

      const ts = data.cached_at ? new Date(data.cached_at * 1000) : new Date();
      document.getElementById("last-updated").textContent = `// ${ts.toLocaleTimeString()}`;

    } catch (err) {
      document.getElementById("grid").innerHTML =
        `<div class="state-box"><div class="state-title">// error</div><div>${esc(err.message)}</div></div>`;
    } finally {
      btn.disabled = false;
      icon.innerHTML = "⟳";
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => loadProjects(false), REFRESH_INTERVAL * 1000);
    }
  }

  async function toggleLogs() {
    const panel  = document.getElementById("logs-panel");
    const toggle = document.getElementById("logs-toggle");
    const isOpen = panel.classList.contains("open");

    if (isOpen) {
      panel.classList.remove("open");
      toggle.classList.remove("open");
      return;
    }

    panel.classList.add("open");
    toggle.classList.add("open");

    if (logsLoaded) return;
    logsLoaded = true;

    const body = document.getElementById("logs-body");
    body.textContent = "loading…";

    try {
      const res  = await fetch("/api/logs?lines=100");
      const data = await res.json();
      const lines = data.logs;

      document.getElementById("logs-count").textContent = `${lines.length} lines`;

      if (lines.length === 0) {
        body.textContent = "// log file is empty";
        return;
      }

      body.innerHTML = lines.map(line => {
        const cls = /error|fail|exception/i.test(line) ? "log-err"
                  : /warn/i.test(line)                 ? "log-warn"
                  : /success|deployed|done|ok/i.test(line) ? "log-ok"
                  : "";
        return `<span class="${cls}">${esc(line)}</span>`;
      }).join("\n");

      body.scrollTop = body.scrollHeight;
    } catch (err) {
      body.textContent = `// error: ${err.message}`;
    }
  }

  loadProjects();
</script>
</body>
</html>
